<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FinSentinel — Cost-Aware, Self-Healing Fraud Detection Agent powered by Gemini and Dynatrace MCP. Enterprise fraud operations command center.">
    <title>FinSentinel — Fraud Operations Command Center</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z'/><path d='m9 12 2 2 4-4'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer><\/script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <!-- ============ SIDEBAR ============ -->
    <aside id="sidebar" class="sidebar">
        <!-- Logo -->
        <div class="sidebar__logo">
            <div class="sidebar__logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#60a5fa"/>
                            <stop offset="50%" stop-color="#818cf8"/>
                            <stop offset="100%" stop-color="#34d399"/>
                        </linearGradient>
                    </defs>
                    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
                    <path d="m9 12 2 2 4-4"/>
                </svg>
            </div>
            <div class="sidebar__logo-text">
                <span class="sidebar__brand">FinSentinel</span>
                <span class="sidebar__tagline">Fraud Operations</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar__nav custom-scrollbar">
            <span class="sidebar__section-label">Main</span>

            <a href="#" class="sidebar__link active" data-tooltip="Dashboard" id="nav-dashboard">
                <span class="sidebar__link-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </span>
                <span class="sidebar__link-label">Dashboard</span>
            </a>

            <a href="transactions.html" class="sidebar__link" data-tooltip="Transaction Explorer" id="nav-transactions">
                <span class="sidebar__link-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </span>
                <span class="sidebar__link-label">Transaction Explorer</span>
            </a>

            <a href="review.html" class="sidebar__link" data-tooltip="Review Queue" id="nav-review">
                <span class="sidebar__link-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="m9 14 2 2 4-4"/></svg>
                </span>
                <span class="sidebar__link-label">Review Queue</span>
            </a>

            <a href="analytics.html" class="sidebar__link" data-tooltip="Analytics" id="nav-analytics">
                <span class="sidebar__link-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                </span>
                <span class="sidebar__link-label">Analytics</span>
            </a>

            <span class="sidebar__section-label">System</span>

            <a href="settings.html" class="sidebar__link" data-tooltip="Settings" id="nav-settings">
                <span class="sidebar__link-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
                <span class="sidebar__link-label">Settings</span>
            </a>

            <a href="observability.html" class="sidebar__link" data-tooltip="Observability" id="nav-observability">
                <span class="sidebar__link-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </span>
                <span class="sidebar__link-label">Observability</span>
            </a>
        </nav>

        <!-- Collapse Toggle -->
        <div class="sidebar__footer">
            <button id="sidebar-toggle" class="sidebar__toggle" title="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17-5-5 5-5"/><path d="m18 17-5-5 5-5"/></svg>
                <span class="sidebar__toggle-label">Collapse</span>
            </button>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="main-content">

        <!-- TOP BAR -->
        <header class="topbar" id="topbar">
            <div class="topbar__left">
                <h1 class="topbar__page-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Command Center
                </h1>
                <div class="topbar__search">
                    <svg class="topbar__search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" class="topbar__search-input" placeholder="Search transactions, IDs, customers..." id="global-search">
                </div>
            </div>
            <div class="topbar__right">

                <button class="topbar__icon-btn" id="btn-notifications" title="Notifications">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    <span class="topbar__notification-dot"></span>
                </button>
                <div class="topbar__avatar" title="Admin">SA</div>
            </div>
        </header>

        <!-- DASHBOARD CONTENT -->
        <main class="dashboard">

            <!-- KPI CARDS ROW -->
            <section class="kpi-row" id="kpi-section">
                <!-- Total Processed -->
                <div class="kpi-card kpi-card--total">
                    <div class="kpi-card__header">
                        <span class="kpi-card__label">Total Processed</span>
                        <div class="kpi-card__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>
                        </div>
                    </div>
                    <div class="kpi-card__value mono" id="kpi-total-val">0</div>
                    <div class="kpi-card__trend kpi-card__trend--up">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                        Live stream
                    </div>
                </div>

                <!-- Approved -->
                <div class="kpi-card kpi-card--approved">
                    <div class="kpi-card__header">
                        <span class="kpi-card__label">Approved</span>
                        <div class="kpi-card__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                        </div>
                    </div>
                    <div class="kpi-card__value mono" id="kpi-approved-val">0</div>
                    <div class="kpi-card__trend">Safe transactions</div>
                </div>

                <!-- Flagged -->
                <div class="kpi-card kpi-card--flagged">
                    <div class="kpi-card__header">
                        <span class="kpi-card__label">Flagged</span>
                        <div class="kpi-card__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                        </div>
                    </div>
                    <div class="kpi-card__value mono" id="kpi-flagged-val">0</div>
                    <div class="kpi-card__trend">Pending review</div>
                </div>

                <!-- Blocked -->
                <div class="kpi-card kpi-card--blocked">
                    <div class="kpi-card__header">
                        <span class="kpi-card__label">Blocked</span>
                        <div class="kpi-card__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
                        </div>
                    </div>
                    <div class="kpi-card__value mono" id="kpi-blocked-val">0</div>
                    <div class="kpi-card__trend">Threats stopped</div>
                </div>

                <!-- Fraud Rate -->
                <div class="kpi-card kpi-card--rate">
                    <div class="kpi-card__header">
                        <span class="kpi-card__label">Fraud Rate</span>
                        <div class="kpi-card__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
                        </div>
                    </div>
                    <div class="kpi-card__value mono" id="kpi-fraud-rate-val">0.0%</div>
                    <div class="kpi-card__trend">Detection ratio</div>
                </div>

                <!-- API Cost -->
                <div class="kpi-card kpi-card--cost">
                    <div class="kpi-card__header">
                        <span class="kpi-card__label">API Cost</span>
                        <div class="kpi-card__icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                    </div>
                    <div class="kpi-card__value mono" id="kpi-cost-val">$0.000</div>
                    <div class="kpi-card__trend">Since server start</div>
                </div>
            </section>

            <!-- MAIN DASHBOARD GRID -->
            <section class="dashboard__grid">

                <!-- LEFT: Live Transaction Feed -->
                <div class="glass-panel panel feed-panel">
                    <div class="panel__header">
                        <h2 class="panel__title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
                            Live Transaction Feed
                        </h2>
                        <div class="panel__actions">
                            <button class="panel__action-btn active">All</button>
                            <button class="panel__action-btn">Flagged</button>
                            <button class="panel__action-btn">Blocked</button>
                        </div>
                    </div>
                    <div id="feed-container" class="panel__body custom-scrollbar">
                        <div class="empty-state">
                            <div class="spinner"></div>
                            <p>Waiting for live data stream...</p>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Investigation Detail -->
                <div class="glass-panel panel detail-panel">
                    <div class="panel__header">
                        <h2 class="panel__title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            Investigation Detail
                        </h2>
                    </div>
                    <div id="detail-container" class="panel__body custom-scrollbar">
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
                            <p>Select a transaction to view investigation details</p>
                        </div>
                    </div>
                </div>

                <!-- BOTTOM-LEFT: Charts Row -->
                <div class="glass-panel panel chart-panel">
                    <div class="panel__header">
                        <h2 class="panel__title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                            Decision Distribution
                        </h2>
                    </div>
                    <div class="panel__body">
                        <canvas id="fraud-chart"></canvas>
                    </div>
                </div>

                <!-- BOTTOM-RIGHT: Cost Over Time -->
                <div class="glass-panel panel chart-panel">
                    <div class="panel__header">
                        <h2 class="panel__title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            Cost Over Time
                        </h2>
                    </div>
                    <div class="panel__body">
                        <canvas id="cost-chart"></canvas>
                    </div>
                </div>

                <!-- FULL-WIDTH: Self-Healing Engine + Health -->
                <div class="glass-panel panel health-panel">
                    <div class="panel__header">
                        <h2 class="panel__title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
                            Self-Healing Engine
                        </h2>
                    </div>
                    <div class="health-grid">
                        <!-- Budget Utilization -->
                        <div class="health-card">
                            <div class="health-card__label">Hourly API Burn</div>
                            <div id="hourly-burn" class="health-card__value mono text-emerald">$0.0000</div>
                            <div style="margin-top: 0.5rem;">
                                <div style="display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-dim); margin-bottom: 4px;">
                                    <span>Budget Used</span>
                                    <span id="budget-pct" class="mono">0.0%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div id="budget-progress" class="progress-bar progress-bar--emerald" style="width: 0%;"></div>
                                </div>
                            </div>
                        </div>

                        <!-- False Positive Rate -->
                        <div class="health-card">
                            <div class="health-card__label">Dynatrace False Positive Rate</div>
                            <div class="fp-section" style="margin-bottom: 0;">
                                <div class="fp-header">
                                    <span style="font-size: 0.7rem;">Detection Accuracy</span>
                                    <span id="fp-rate" class="fp-value mono text-emerald">0.0%</span>
                                </div>
                                <div class="progress-bar-bg threshold-bar" style="margin-top: 4px;">
                                    <div id="fp-progress" class="progress-bar progress-bar--blue" style="width: 0%; transition: width 1s ease, background-color 1s ease;"></div>
                                    <div class="threshold-marker"></div>
                                </div>
                                <div class="threshold-label">Threshold: 15.0%</div>
                            </div>
                        </div>

                        <!-- Routing Tier -->
                        <div class="health-card">
                            <div class="health-card__label">Active Cost Router Strategy</div>
                            <div id="routing-tier" class="routing-badge routing-badge--standard" style="margin-top: 0.5rem;">
                                STANDARD TIER
                            </div>
                            <div id="mcp-alert" class="mcp-alert hidden">
                                <div class="mcp-alert__title">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                                    MCP HEALING ACTIVATED
                                </div>
                                <div class="mcp-alert__desc">High false positives detected. Router locked to Premium tier.</div>
                            </div>
                        </div>
                    </div>
                </div>

            </section>

        </main>
    </div>

    <!-- JavaScript -->
    <script src="js/icons.js" defer><\/script>
    <script src="js/dashboard.js" defer><\/script>

</body>
</html>
